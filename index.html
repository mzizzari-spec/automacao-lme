<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LME — Cotações de Metais V2</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
  :root {
    --bg: #f5f6f8; --surface: #ffffff; --surface2: #f0f1f4; --border: #e2e4ea;
    --copper: #c45e1a; --aluminium: #2b6cb0; --dollar: #1a7a42;
    --text: #1a1d2e; --text-dim: #6b7280;
    --real-badge: #dcfce7; --real-text: #15803d;
    --proj-badge: #dbeafe; --proj-text: #1d4ed8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; padding: 32px 24px; }
  .container { max-width: 1200px; margin: 0 auto; }
  header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 40px; padding-bottom: 24px; border-bottom: 1px solid var(--border); }
  .header-left h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
  .header-left h1 span { color: var(--copper); }
  .header-left p { margin-top: 4px; font-size: 13px; color: var(--text-dim); }
  .month-selector { display: flex; align-items: center; gap: 8px; }
  .month-selector label { font-size: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; }
  .month-selector select { background: var(--surface); border: 1px solid var(--border); color: var(--text); font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 500; padding: 8px 12px; border-radius: 6px; cursor: pointer; outline: none; }
  .cards { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; margin-bottom: 28px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
  .card-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
  .card-value { font-family: 'JetBrains Mono', monospace; font-size: 18px; font-weight: 500; }
  .card-sub { font-size: 11px; color: var(--text-dim); margin-top: 4px; }
  .card.copper .card-value { color: var(--copper); }
  .card.aluminium .card-value { color: var(--aluminium); }
  .card.dollar .card-value { color: var(--dollar); }
  .card-section-title { grid-column: 1 / -1; font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.1em; padding-bottom: 4px; border-bottom: 1px solid var(--border); margin-top: 8px; }
  .chart-wrapper { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 20px 24px; margin-bottom: 28px; }
  .chart-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .chart-title { font-size: 13px; font-weight: 600; }
  .legend { display: flex; gap: 16px; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-dim); }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }
  canvas { max-height: 260px; }
  .table-wrapper { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .table-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--border); }
  .table-title { font-size: 13px; font-weight: 600; }
  table { width: 100%; border-collapse: collapse; }
  thead th { padding: 10px 16px; text-align: left; font-size: 11px; font-weight: 500; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.06em; background: var(--surface2); border-bottom: 1px solid var(--border); }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--surface2); }
  tbody td { padding: 10px 16px; font-family: 'JetBrains Mono', monospace; font-size: 12px; }
  tbody td:first-child { font-family: 'Inter', sans-serif; font-size: 13px; color: var(--text-dim); }
  tbody td:nth-child(2) { font-family: 'Inter', sans-serif; font-size: 12px; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 600; font-family: 'Inter', sans-serif; text-transform: uppercase; }
  .badge-real { background: var(--real-badge); color: var(--real-text); }
  .badge-proj { background: var(--proj-badge); color: var(--proj-text); }
  .media-row td { font-weight: 600; font-family: 'Inter', sans-serif !important; font-size: 12px !important; background: var(--surface2); border-top: 2px solid var(--border); }
  .media-real-row td { color: var(--real-text) !important; }
  .media-proj-row td { color: var(--proj-text) !important; }
  .state { text-align: center; padding: 60px 20px; color: var(--text-dim); font-size: 14px; }
  .spinner { width: 28px; height: 28px; border: 2px solid var(--border); border-top-color: var(--copper); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .updated { font-size: 11px; color: var(--text-dim); }
  @media (max-width: 900px) { .cards { grid-template-columns: repeat(3, 1fr); } header { flex-direction: column; align-items: flex-start; gap: 16px; } }
  @media (max-width: 600px) { .cards { grid-template-columns: repeat(2, 1fr); } body { padding: 16px; } }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="header-left">
      <h1>LME <span>Metais</span></h1>
      <p id="updated-at">Carregando dados...</p>
    </div>
    <div class="month-selector">
      <label>Mes</label>
      <select id="month-select" onchange="filtrarMes()"><option value="">Carregando...</option></select>
    </div>
  </header>
  <div class="cards" id="cards"><div class="state" style="grid-column:1/-1"><div class="spinner"></div>Carregando...</div></div>
  <div class="chart-wrapper">
    <div class="chart-header">
      <span class="chart-title">Evolucao do mes</span>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:var(--copper)"></div>Cobre</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--aluminium)"></div>Aluminio</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--dollar)"></div>Dolar</div>
      </div>
    </div>
    <canvas id="chart"></canvas>
  </div>
  <div class="table-wrapper">
    <div class="table-header">
      <span class="table-title">Cotacoes diarias</span>
      <span class="updated" id="total-dias"></span>
    </div>
    <div id="table-container"><div class="state"><div class="spinner"></div></div></div>
  </div>
</div>
<script>
var SHEET_ID = '10XV0A_U4LvG4Yc1a8lOjw81njnlu9lGjTHFTRGxHUHQ';
var ABA = 'Consolidado';
var URL_SHEETS = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/gviz/tq?tqx=out:json&sheet=' + encodeURIComponent(ABA);
var todosOsDados = [];
var chartObj = null;

function fmt(v, dec) {
  if (dec === undefined) dec = 2;
  if (v === null || v === undefined || v === '') return '-';
  var s = String(v).trim();
  var num;
  if (s.indexOf(',') !== -1 && s.indexOf('.') !== -1) {
    // formato 13.612,00 -> remove ponto e troca virgula por ponto
    s = s.replace(/\./g, '').replace(',', '.');
    num = parseFloat(s);
  } else if (s.indexOf(',') !== -1) {
    // formato 13,612 -> troca virgula por ponto
    s = s.replace(',', '.');
    num = parseFloat(s);
  } else {
    num = parseFloat(s);
  }
  if (isNaN(num)) return '-';
  return num.toLocaleString('pt-BR', {minimumFractionDigits: dec, maximumFractionDigits: dec});
}

function calcMedia(arr, campo, tipo) {
  var vals = arr
    .filter(function(r) { return tipo ? r['Tipo'] === tipo : true; })
    .map(function(r) { return parseFloat(r[campo]); })
    .filter(function(v) { return !isNaN(v) && v > 0; });
  if (!vals.length) return null;
  return vals.reduce(function(a, b) { return a + b; }, 0) / vals.length;
}

function carregarDados() {
  fetch(URL_SHEETS)
    .then(function(resp) { return resp.text(); })
    .then(function(text) {
      var match = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/);
      var json = JSON.parse(match[1]);
      var rows = json.table.rows;
      var cols = json.table.cols.map(function(c) { return c.label; });
      todosOsDados = rows.map(function(row) {
        var obj = {};
        cols.forEach(function(col, i) { obj[col] = row.c[i] ? row.c[i].v : null; });
        return obj;
      }).filter(function(r) { return r['Tipo'] === 'Real' || r['Tipo'] === 'Projetado'; });
      popularMeses();
      filtrarMes();
      var agora = new Date();
      document.getElementById('updated-at').textContent = 'Atualizado em ' + agora.toLocaleDateString('pt-BR') + ' as ' + agora.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
    })
    .catch(function(e) {
      document.getElementById('cards').innerHTML = '<div class="state" style="grid-column:1/-1">Erro ao carregar dados. Verifique se a planilha esta publica.</div>';
      console.error(e);
    });
}

function popularMeses() {
  var vistos = {};
  var meses = [];
  todosOsDados.forEach(function(r) {
    if (r['Mes'] && !vistos[r['Mes']]) { vistos[r['Mes']] = true; meses.push(r['Mes']); }
    if (r['\u00eas'] && !vistos[r['\u00eAs']]) { vistos[r['\u00eAs']] = true; meses.push(r['\u00eAs']); }
  });
  // tenta coluna Mes com acento
  var mesesFinal = [];
  var vistos2 = {};
  todosOsDados.forEach(function(r) {
    var m = r['M\u00eas'] || r['Mes'] || null;
    if (m && !vistos2[m]) { vistos2[m] = true; mesesFinal.push(m); }
  });
  mesesFinal.reverse();
  var sel = document.getElementById('month-select');
  sel.innerHTML = mesesFinal.map(function(m) { return '<option value="' + m + '">' + m + '</option>'; }).join('');
}

function filtrarMes() {
  var mes = document.getElementById('month-select').value;
  var dados = todosOsDados.filter(function(r) {
    var m = r['M\u00eas'] || r['Mes'] || null;
    return m === mes;
  });
  renderCards(dados);
  renderChart(dados);
  renderTable(dados);
}

function renderCards(dados) {
  var c1 = 'Cobre (US$/t)';
  var c2 = 'Alum\u00ednio (US$/t)';
  var c3 = 'D\u00f3lar (R$/US$)';
  document.getElementById('cards').innerHTML =
    '<div class="card-section-title">Media Real</div>' +
    '<div class="card copper"><div class="card-label">Cobre</div><div class="card-value">' + fmt(calcMedia(dados,c1,'Real'),2) + '</div><div class="card-sub">US$/t</div></div>' +
    '<div class="card aluminium"><div class="card-label">Aluminio</div><div class="card-value">' + fmt(calcMedia(dados,c2,'Real'),2) + '</div><div class="card-sub">US$/t</div></div>' +
    '<div class="card dollar"><div class="card-label">Dolar</div><div class="card-value">' + fmt(calcMedia(dados,c3,'Real'),2) + '</div><div class="card-sub">R$/US$</div></div>' +
    '<div class="card-section-title">Media Projetada</div>' +
    '<div class="card copper"><div class="card-label">Cobre</div><div class="card-value">' + fmt(calcMedia(dados,c1,null),2) + '</div><div class="card-sub">US$/t</div></div>' +
    '<div class="card aluminium"><div class="card-label">Aluminio</div><div class="card-value">' + fmt(calcMedia(dados,c2,null),2) + '</div><div class="card-sub">US$/t</div></div>' +
    '<div class="card dollar"><div class="card-label">Dolar</div><div class="card-value">' + fmt(calcMedia(dados,c3,null),2) + '</div><div class="card-sub">R$/US$</div></div>';
}

function renderChart(dados) {
  var labels = dados.map(function(r) { return r['Data'] ? String(r['Data']).substring(0,5) : ''; });
  var cobre = dados.map(function(r) { return parseFloat(r['Cobre (US$/t)']); });
  var al = dados.map(function(r) { return parseFloat(r['Alum\u00ednio (US$/t)']); });
  var dol = dados.map(function(r) { return parseFloat(r['D\u00f3lar (R$/US$)']); });
  if (chartObj) chartObj.destroy();
  var ctx = document.getElementById('chart').getContext('2d');
  chartObj = new Chart(ctx, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [
        { label: 'Cobre', data: cobre, borderColor: '#c45e1a', backgroundColor: 'rgba(196,94,26,0.08)', borderWidth: 2, pointRadius: 3, tension: 0.3, yAxisID: 'y',
          segment: { borderDash: function(c) { return dados[c.p1DataIndex] && dados[c.p1DataIndex]['Tipo']==='Projetado' ? [4,4] : []; } } },
        { label: 'Aluminio', data: al, borderColor: '#2b6cb0', borderWidth: 2, pointRadius: 3, tension: 0.3, yAxisID: 'y',
          segment: { borderDash: function(c) { return dados[c.p1DataIndex] && dados[c.p1DataIndex]['Tipo']==='Projetado' ? [4,4] : []; } } },
        { label: 'Dolar', data: dol, borderColor: '#1a7a42', borderWidth: 2, pointRadius: 3, tension: 0.3, yAxisID: 'y2',
          segment: { borderDash: function(c) { return dados[c.p1DataIndex] && dados[c.p1DataIndex]['Tipo']==='Projetado' ? [4,4] : []; } } }
      ]
    },
    options: {
      responsive: true,
      interaction: { mode: 'index', intersect: false },
      plugins: { legend: { display: false }, tooltip: { backgroundColor: '#fff', borderColor: '#e2e4ea', borderWidth: 1, titleColor: '#1a1d2e', bodyColor: '#6b7280', padding: 10 } },
      scales: {
        x: { grid: { color: '#e2e4ea' }, ticks: { color: '#6b7280', font: { size: 11 } } },
        y: { position: 'left', grid: { color: '#e2e4ea' }, ticks: { color: '#6b7280', font: { size: 11 } }, title: { display: true, text: 'US$/t', color: '#6b7280', font: { size: 11 } } },
        y2: { position: 'right', grid: { drawOnChartArea: false }, ticks: { color: '#1a7a42', font: { size: 11 } }, title: { display: true, text: 'R$/US$', color: '#1a7a42', font: { size: 11 } } }
      }
    }
  });
}

function renderTable(dados) {
  var reais = dados.filter(function(r) { return r['Tipo'] === 'Real'; });
  var c1='Cobre (US$/t)', c2='Alum\u00ednio (US$/t)', c3='D\u00f3lar (R$/US$)', c4='Cobre (R$/kg)', c5='Alum\u00ednio (R$/kg)';
  var linhas = dados.map(function(r) {
    return '<tr>' +
      '<td>' + (r['Data'] || '') + '</td>' +
      '<td>' + (r['Dia da Semana'] || '') + '</td>' +
      '<td><span class="badge ' + (r['Tipo']==='Real'?'badge-real':'badge-proj') + '">' + r['Tipo'] + '</span></td>' +
      '<td>' + fmt(parseFloat(r[c1]),2) + '</td>' +
      '<td>' + fmt(parseFloat(r[c2]),2) + '</td>' +
      '<td>' + fmt(parseFloat(r[c3]),2) + '</td>' +
      '<td>' + fmt(parseFloat(r[c4]),4) + '</td>' +
      '<td>' + fmt(parseFloat(r[c5]),4) + '</td>' +
      '</tr>';
  }).join('');
  document.getElementById('table-container').innerHTML =
    '<table><thead><tr><th>Data</th><th>Dia</th><th>Tipo</th><th>Cobre US$/t</th><th>Aluminio US$/t</th><th>Dolar R$/US$</th><th>Cobre R$/kg</th><th>Aluminio R$/kg</th></tr></thead><tbody>' +
    linhas +
    '<tr class="media-row media-real-row"><td colspan="3">Media Real</td><td>' + fmt(calcMedia(dados,c1,'Real'),2) + '</td><td>' + fmt(calcMedia(dados,c2,'Real'),2) + '</td><td>' + fmt(calcMedia(dados,c3,'Real'),2) + '</td><td>' + fmt(calcMedia(dados,c4,'Real'),4) + '</td><td>' + fmt(calcMedia(dados,c5,'Real'),4) + '</td></tr>' +
    '<tr class="media-row media-proj-row"><td colspan="3">Media Projetada</td><td>' + fmt(calcMedia(dados,c1,null),2) + '</td><td>' + fmt(calcMedia(dados,c2,null),2) + '</td><td>' + fmt(calcMedia(dados,c3,null),2) + '</td><td>' + fmt(calcMedia(dados,c4,null),4) + '</td><td>' + fmt(calcMedia(dados,c5,null),4) + '</td></tr>' +
    '</tbody></table>';
  document.getElementById('total-dias').textContent = reais.length + ' dias reais - ' + (dados.length - reais.length) + ' projetados';
}

carregarDados();
</script>
</body>
</html>
