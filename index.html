<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LME Metais</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
  :root {
    --bg: #f5f6f8; --surface: #ffffff; --surface2: #f0f1f4; --border: #e2e4ea;
    --copper: #c45e1a; --aluminium: #2b6cb0; --dollar: #1a7a42;
    --text: #1a1d2e; --text-dim: #6b7280;
    --real-badge: #dcfce7; --real-text: #15803d;
    --proj-badge: #dbeafe; --proj-text: #1d4ed8;
    --up: #15803d; --down: #dc2626;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; padding: 32px 24px; }
  .container { max-width: 1300px; margin: 0 auto; }
  header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 40px; padding-bottom: 24px; border-bottom: 1px solid var(--border); }
  .header-left h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
  .header-left h1 span { color: #1a6080; }
  .header-left p { margin-top: 4px; font-size: 13px; color: var(--text-dim); }
  .header-logo { display: flex; justify-content: center; align-items: center; }
  .header-logo img { height: 100px; object-fit: contain; }
  .month-selector { display: flex; align-items: center; gap: 8px; }
  .month-selector label { font-size: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; }
  .month-selector select { background: var(--surface); border: 1px solid var(--border); color: var(--text); font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 500; padding: 8px 12px; border-radius: 6px; cursor: pointer; outline: none; }
  .cards { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 28px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
  .card-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
  .card-value { font-family: 'JetBrains Mono', monospace; font-size: 18px; font-weight: 500; }
  .card-sub { font-size: 11px; color: var(--text-dim); margin-top: 4px; }
  .card.copper .card-value { color: var(--copper); }
  .card.aluminium .card-value { color: var(--aluminium); }
  .card.dollar .card-value { color: var(--dollar); }
  .card-section-title { grid-column: 1 / -1; font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.1em; padding-bottom: 4px; border-bottom: 1px solid var(--border); margin-top: 8px; }
  .chart-wrapper { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 20px 24px; margin-bottom: 28px; }
  .chart-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .chart-title { font-size: 13px; font-weight: 600; }
  .legend { display: flex; gap: 16px; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-dim); }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }
  canvas { max-height: 260px; }
  .table-wrapper { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .table-wrapper > div { overflow-x: auto; }
  .table-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--border); }
  .table-title { font-size: 13px; font-weight: 600; }
  table { width: 100%; border-collapse: collapse; }
  thead th { padding: 9px 10px; text-align: left; font-size: 10px; font-weight: 500; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.06em; background: var(--surface2); border-bottom: 1px solid var(--border); }
  thead th.center { text-align: center; }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--surface2); }
  tbody td { padding: 8px 10px; font-family: 'JetBrains Mono', monospace; font-size: 12px; }
  tbody td:first-child { font-family: 'Inter', sans-serif; font-size: 12px; color: var(--text-dim); }
  tbody td:nth-child(2) { font-family: 'Inter', sans-serif; font-size: 11px; }
  tbody td.center { text-align: center; }
  .var-up { color: var(--up); font-size: 10px; }
  .var-down { color: var(--down); font-size: 10px; }
  .var-neutral { color: var(--text-dim); font-size: 10px; }
  .badge { display: inline-block; padding: 2px 7px; border-radius: 4px; font-size: 10px; font-weight: 600; font-family: 'Inter', sans-serif; text-transform: uppercase; }
  .badge-real { background: var(--real-badge); color: var(--real-text); }
  .badge-proj { background: var(--proj-badge); color: var(--proj-text); }
  .semana-row td { background: #f8f9fa !important; color: #9aa0b4 !important; font-size: 11px !important; font-style: italic; border-bottom: 2px solid var(--border) !important; }
  .media-row td { font-weight: 600; font-family: 'Inter', sans-serif !important; font-size: 11px !important; background: var(--surface2); border-top: 2px solid var(--border); }
  .media-real-row td { color: var(--real-text) !important; }
  .media-proj-row td { color: var(--proj-text) !important; }
  .state { text-align: center; padding: 60px 20px; color: var(--text-dim); font-size: 14px; }
  .spinner { width: 28px; height: 28px; border: 2px solid var(--border); border-top-color: var(--copper); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .updated { font-size: 11px; color: var(--text-dim); }
  .hist-section { margin-top: 32px; }
  .hist-section-title { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
  .hist-filtro { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  .hist-btn { background: var(--surface); border: 1px solid var(--border); color: var(--text-dim); font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 500; padding: 6px 14px; border-radius: 6px; cursor: pointer; transition: all 0.15s; }
  .hist-btn:hover { border-color: var(--copper); color: var(--copper); }
  .hist-btn.active { background: var(--copper); border-color: var(--copper); color: #fff; }
  @media (max-width: 900px) { .cards { grid-template-columns: repeat(3, 1fr); } header { flex-direction: column; align-items: flex-start; gap: 16px; } }
  @media (max-width: 600px) { .cards { grid-template-columns: repeat(2, 1fr); } body { padding: 16px; } }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="header-left">
      <h1>LME <span>Metais</span></h1>
      <p id="updated-at">Carregando dados...</p>
    </div>
    <div class="header-logo">
      <img src="GMC-logo.png" alt="Grupo Melo Cordeiro">
    </div>
    <div class="month-selector">
      <label>Mes</label>
      <select id="month-select" onchange="filtrarMes()"><option value="">Carregando...</option></select>
    </div>
  </header>
  <div class="cards" id="cards"><div class="state" style="grid-column:1/-1"><div class="spinner"></div>Carregando...</div></div>
  <div class="chart-wrapper">
    <div class="chart-header">
      <span class="chart-title">Evolucao do mes</span>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:var(--copper)"></div>Cobre</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--aluminium)"></div>Aluminio</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--dollar)"></div>Dolar</div>
      </div>
    </div>
    <canvas id="chart"></canvas>
  </div>
  <div class="table-wrapper">
    <div class="table-header">
      <span class="table-title">Cotacoes diarias</span>
      <span class="updated" id="total-dias"></span>
    </div>
    <div id="table-container"><div class="state"><div class="spinner"></div></div></div>
  </div>
</div>
<div class="hist-section">
  <div class="hist-section-title">Evolucao Historica Mensal</div>
  <div class="hist-filtro" id="hist-filtro"><div class="spinner" style="width:20px;height:20px;margin:0;"></div></div>
  <div class="chart-wrapper" style="margin-bottom:20px;">
    <div class="chart-header">
      <span class="chart-title">Cobre - Aluminio - Dolar historico</span>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:var(--copper)"></div>Cobre</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--aluminium)"></div>Aluminio</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--dollar)"></div>Dolar</div>
      </div>
    </div>
    <canvas id="chart-hist"></canvas>
  </div>
  <div class="table-wrapper">
    <div class="table-header"><span class="table-title">Resumo mensal</span></div>
    <div id="hist-tabela"><div class="state"><div class="spinner"></div></div></div>
  </div>
</div>
<script>
var SHEET_ID = '10XV0A_U4LvG4Yc1a8lOjw81njnlu9lGjTHFTRGxHUHQ';
var ABA = 'Consolidado';
var ABA_HIST = 'Historico';
var URL_SHEETS = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/gviz/tq?tqx=out:json&headers=1&sheet=' + encodeURIComponent(ABA);
var URL_HIST = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/gviz/tq?tqx=out:json&headers=1&sheet=' + encodeURIComponent(ABA_HIST);
var todosOsDados = [];
var dadosHistorico = [];
var mediasMesAnterior = {real: null, proj: null};
var chartObj = null;
var chartHistObj = null;

function toNum(v) {
  if (v === null || v === undefined || v === '') return null;
  var s = String(v).trim();
  if (s.indexOf(',') !== -1 && s.indexOf('.') !== -1) {
    s = s.replace(/\./g, '').replace(',', '.');
  } else if (s.indexOf(',') !== -1) {
    s = s.replace(',', '.');
  }
  var n = parseFloat(s);
  return isNaN(n) ? null : n;
}

function fmt(v, dec) {
  if (dec === undefined) dec = 2;
  var n = toNum(v);
  if (n === null) return '-';
  return n.toLocaleString('pt-BR', {minimumFractionDigits: dec, maximumFractionDigits: dec});
}

function fmtVar(v) {
  var n = typeof v === 'number' ? v : toNum(v);
  if (n === null || n === undefined || isNaN(n)) return '<span class="var-neutral">-</span>';
  var pct = (n * 100).toFixed(2);
  var sinal = n > 0 ? '+' : '';
  var cls = n > 0 ? 'var-up' : n < 0 ? 'var-down' : 'var-neutral';
  return '<span class="' + cls + '">' + sinal + pct + '%</span>';
}

function calcMedia(arr, campo, tipo) {
  var vals = arr
    .filter(function(r) { return tipo ? r['Tipo'] === tipo : true; })
    .map(function(r) { return toNum(r[campo]); })
    .filter(function(v) { return v !== null && v > 0; });
  if (!vals.length) return null;
  return vals.reduce(function(a, b) { return a + b; }, 0) / vals.length;
}

function varSem(atual, ant) {
  if (atual === null || ant === null || ant === 0) return null;
  return (atual - ant) / ant;
}

function getMesAnterior() {
  var agora = new Date();
  var mes = agora.getMonth(); // 0-based
  var ano = agora.getFullYear();
  if (mes === 0) { mes = 11; ano--; } else { mes--; }
  var meses = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  return meses[mes] + '/' + ano;
}

function carregarMesAnterior() {
  var mesAnt = getMesAnterior();
  var url = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/gviz/tq?tqx=out:json&headers=1&sheet=' + encodeURIComponent(mesAnt);
  fetch(url)
    .then(function(resp) { return resp.text(); })
    .then(function(text) {
      var match = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/);
      var json = JSON.parse(match[1]);
      var rows = json.table.rows;
      var cols = json.table.cols.map(function(c) { return c.label; });
      var dadosAnt = rows.map(function(row) {
        var obj = {};
        cols.forEach(function(col, i) { obj[col] = row.c[i] ? row.c[i].v : null; });
        return obj;
      });
      mediasMesAnterior.real = dadosAnt.find(function(r) { return r['Data'] === 'Média Real' || r['Tipo'] === 'Média Real'; }) || null;
      mediasMesAnterior.proj = dadosAnt.find(function(r) { return r['Data'] === 'Média Projetada' || r['Tipo'] === 'Média Projetada'; }) || null;
    })
    .catch(function(e) { console.log('Mes anterior nao encontrado'); });
}

function carregarDados() {
  fetch(URL_SHEETS)
    .then(function(resp) { return resp.text(); })
    .then(function(text) {
      var match = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/);
      var json = JSON.parse(match[1]);
      var rows = json.table.rows;
      var cols = json.table.cols.map(function(c) { return c.label; });
      todosOsDados = rows.map(function(row) {
        var obj = {};
        cols.forEach(function(col, i) { obj[col] = row.c[i] ? row.c[i].v : null; });
        return obj;
      }).filter(function(r) { return r['Tipo'] === 'Real' || r['Tipo'] === 'Projetado'; });
      popularMeses();
      filtrarMes();
      var agora = new Date();
      document.getElementById('updated-at').textContent = 'Atualizado em ' + agora.toLocaleDateString('pt-BR') + ' as ' + agora.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
    })
    .catch(function(e) {
      document.getElementById('cards').innerHTML = '<div class="state" style="grid-column:1/-1">Erro ao carregar dados.</div>';
    });
}

function popularMeses() {
  var vistos = {};
  var mesesFinal = [];
  todosOsDados.forEach(function(r) {
    var m = r['M\u00eas'] || r['Mes'] || null;
    if (m && !vistos[m]) { vistos[m] = true; mesesFinal.push(m); }
  });
  mesesFinal.reverse();
  var sel = document.getElementById('month-select');
  sel.innerHTML = mesesFinal.map(function(m) { return '<option value="' + m + '">' + m + '</option>'; }).join('');
}

function filtrarMes() {
  var mes = document.getElementById('month-select').value;
  var dados = todosOsDados.filter(function(r) {
    var m = r['M\u00eas'] || r['Mes'] || null;
    return m === mes;
  });
  renderCards(dados);
  renderChart(dados);
  renderTable(dados);
}

function varMes(atual, campo) {
  // atual = valor calculado do mes atual (Real ou Projetado)
  // campo = nome da coluna no historico para buscar o mes anterior
  if (!dadosHistorico || dadosHistorico.length < 2) return null;
  var mes = document.getElementById('month-select').value;
  var idx = dadosHistorico.findIndex(function(r) { return (r['Mês'] || r['Mes']) === mes; });
  var mesAnt = idx > 0 ? dadosHistorico[idx - 1] : dadosHistorico[dadosHistorico.length - 1];
  if (!mesAnt) return null;
  var a = typeof atual === 'number' ? atual : toNum(atual);
  var b = toNum(mesAnt[campo]);
  if (a === null || b === null || b === 0) return null;
  return (a - b) / b;
}

function cardHtml(cls, label, valor, dec, unidade, varPct) {
  var varHtml = '';
  if (varPct !== null && varPct !== undefined) {
    var pct = (varPct * 100).toFixed(2);
    var sinal = varPct > 0 ? '+' : '';
    var cor = varPct > 0 ? 'var(--up)' : varPct < 0 ? 'var(--down)' : 'var(--text-dim)';
    varHtml = '<div style="font-size:10px;color:' + cor + ';margin-top:3px;">' + sinal + pct + '%</div>';
  }
  return '<div class="card ' + cls + '">' +
    '<div class="card-label">' + label + '</div>' +
    '<div class="card-value">' + fmt(valor, dec) + '</div>' +
    '<div class="card-sub">' + unidade + varHtml + '</div>' +
    '</div>';
}

function renderCards(dados) {
  var c1 = 'Cobre (US$/t)', c2 = 'Alum\u00ednio (US$/t)', c3 = 'D\u00f3lar (R$/US$)', c4 = 'Cobre (R$/kg)', c5 = 'Alum\u00ednio (R$/kg)';
  var mR_c = calcMedia(dados,c1,'Real'), mP_c = calcMedia(dados,c1,null);
  var mR_a = calcMedia(dados,c2,'Real'), mP_a = calcMedia(dados,c2,null);
  var mR_d = calcMedia(dados,c3,'Real'), mP_d = calcMedia(dados,c3,null);
  var mR_ck = calcMedia(dados,c4,'Real'), mP_ck = calcMedia(dados,c4,null);
  var mR_ak = calcMedia(dados,c5,'Real'), mP_ak = calcMedia(dados,c5,null);

  var vR_c = varMes(mR_c, 'Cobre (US$/t)');
  var vR_a = varMes(mR_a, 'Alum\u00ednio (US$/t)');
  var vR_d = varMes(mR_d, 'D\u00f3lar');
  var vR_ck = varMes(mR_ck, 'Cobre (R$/kg)');
  var vR_ak = varMes(mR_ak, 'Alum\u00ednio (R$/kg)');
  // Projetada vs mes anterior (igual Real)
  var vP_c = varMes(mP_c, 'Cobre (US$/t)');
  var vP_a = varMes(mP_a, 'Alumínio (US$/t)');
  var vP_d = varMes(mP_d, 'Dólar');
  var vP_ck = varMes(mP_ck, 'Cobre (R$/kg)');
  var vP_ak = varMes(mP_ak, 'Alumínio (R$/kg)');

  document.getElementById('cards').innerHTML =
    '<div class="card-section-title">Media Real</div>' +
    cardHtml('copper', 'Cobre', mR_c, 2, 'US$/t', vR_c) +
    cardHtml('aluminium', 'Aluminio', mR_a, 2, 'US$/t', vR_a) +
    cardHtml('dollar', 'Dolar', mR_d, 4, 'R$/US$', vR_d) +
    cardHtml('copper', 'Cobre R$/kg', mR_ck, 2, 'R$/kg', vR_ck) +
    cardHtml('aluminium', 'Aluminio R$/kg', mR_ak, 2, 'R$/kg', vR_ak) +
    '<div class="card-section-title">Media Projetada</div>' +
    cardHtml('copper', 'Cobre', mP_c, 2, 'US$/t', vP_c) +
    cardHtml('aluminium', 'Aluminio', mP_a, 2, 'US$/t', vP_a) +
    cardHtml('dollar', 'Dolar', mP_d, 4, 'R$/US$', vP_d) +
    cardHtml('copper', 'Cobre R$/kg', mP_ck, 2, 'R$/kg', vP_ck) +
    cardHtml('aluminium', 'Aluminio R$/kg', mP_ak, 2, 'R$/kg', vP_ak);
}

function renderChart(dados) {
  var labels = dados.map(function(r) { return r['Data'] ? String(r['Data']).substring(0,5) : ''; });
  var cobre = dados.map(function(r) { return toNum(r['Cobre (US$/t)']); });
  var al = dados.map(function(r) { return toNum(r['Alum\u00ednio (US$/t)']); });
  var dol = dados.map(function(r) { return toNum(r['D\u00f3lar (R$/US$)']); });
  if (chartObj) chartObj.destroy();
  var ctx = document.getElementById('chart').getContext('2d');
  chartObj = new Chart(ctx, {
    type: 'line',
    data: { labels: labels, datasets: [
      { label: 'Cobre', data: cobre, borderColor: '#c45e1a', backgroundColor: 'rgba(196,94,26,0.08)', borderWidth: 2, pointRadius: 3, tension: 0.3, yAxisID: 'y',
        segment: { borderDash: function(c) { return dados[c.p1DataIndex] && dados[c.p1DataIndex]['Tipo']==='Projetado' ? [4,4] : []; } } },
      { label: 'Aluminio', data: al, borderColor: '#2b6cb0', borderWidth: 2, pointRadius: 3, tension: 0.3, yAxisID: 'y',
        segment: { borderDash: function(c) { return dados[c.p1DataIndex] && dados[c.p1DataIndex]['Tipo']==='Projetado' ? [4,4] : []; } } },
      { label: 'Dolar', data: dol, borderColor: '#1a7a42', borderWidth: 2, pointRadius: 3, tension: 0.3, yAxisID: 'y2',
        segment: { borderDash: function(c) { return dados[c.p1DataIndex] && dados[c.p1DataIndex]['Tipo']==='Projetado' ? [4,4] : []; } } }
    ]},
    options: { responsive: true, interaction: { mode: 'index', intersect: false },
      plugins: { legend: { display: false }, tooltip: { backgroundColor: '#fff', borderColor: '#e2e4ea', borderWidth: 1, titleColor: '#1a1d2e', bodyColor: '#6b7280', padding: 10 } },
      scales: {
        x: { grid: { color: '#e2e4ea' }, ticks: { color: '#6b7280', font: { size: 11 } } },
        y: { position: 'left', grid: { color: '#e2e4ea' }, ticks: { color: '#6b7280', font: { size: 11 } }, title: { display: true, text: 'US$/t', color: '#6b7280', font: { size: 11 } } },
        y2: { position: 'right', grid: { drawOnChartArea: false }, ticks: { color: '#1a7a42', font: { size: 11 } }, title: { display: true, text: 'R$/US$', color: '#1a7a42', font: { size: 11 } } }
      }
    }
  });
}

function renderTable(dados) {
  var reais = dados.filter(function(r) { return r['Tipo'] === 'Real'; });
  var c1='Cobre (US$/t)', c2='Alum\u00ednio (US$/t)', c3='D\u00f3lar (R$/US$)', c4='Cobre (R$/kg)', c5='Alum\u00ednio (R$/kg)';
  var vc1='Var. Cobre', vc2='Var. Alum\u00ednio', vc3='Var. D\u00f3lar', vc4='Var. Cobre/kg', vc5='Var. Alum\u00ednio/kg';
  var semanaAtual = [], linhasTabela = [], semanaNum = null;

  function getWeekNumber(d) {
    var onejan = new Date(d.getFullYear(), 0, 1);
    return Math.ceil((((d - onejan) / 86400000) + onejan.getDay() + 1) / 7);
  }

  dados.forEach(function(r, idx) {
    var partes = String(r['Data'] || '').split('/');
    var d = partes.length === 3 ? new Date(partes[2], partes[1]-1, partes[0]) : null;
    var semana = d ? getWeekNumber(d) : null;
    if (semanaNum !== null && semana !== semanaNum && semanaAtual.length > 0) {
      linhasTabela.push({tipo: 'semana', dados: semanaAtual.slice()}); semanaAtual = [];
    }
    semanaNum = semana;
    linhasTabela.push({tipo: 'dia', r: r});
    semanaAtual.push(r);
    var proximo = dados[idx+1];
    var proximaSemana = proximo ? (function() {
      var pp = String(proximo['Data'] || '').split('/');
      var dd = pp.length === 3 ? new Date(pp[2], pp[1]-1, pp[0]) : null;
      return dd ? getWeekNumber(dd) : null;
    })() : null;
    if (proximaSemana !== semana && semanaAtual.length > 0) {
      linhasTabela.push({tipo: 'semana', dados: semanaAtual.slice()}); semanaAtual = [];
    }
  });

  function medSemana(arr, campo) {
    var vals = arr.map(function(r) { return toNum(r[campo]); }).filter(function(v) { return v !== null; });
    return vals.length ? vals.reduce(function(a,b){return a+b;},0)/vals.length : null;
  }

  var linhasFinais = [], semanaAdicionadas = new Set();
  linhasTabela.forEach(function(item) {
    if (item.tipo === 'semana') {
      var key = item.dados.map(function(r){return r['Data'];}).join(',');
      if (!semanaAdicionadas.has(key)) { semanaAdicionadas.add(key); linhasFinais.push(item); }
    } else { linhasFinais.push(item); }
  });

  // Pre-calcula medias de todas as semanas para calcular variacao entre semanas
  var mediasSemanas = [];
  linhasFinais.forEach(function(item) {
    if (item.tipo === 'semana') {
      mediasSemanas.push({
        c1: medSemana(item.dados,c1), c2: medSemana(item.dados,c2),
        c3: medSemana(item.dados,c3), c4: medSemana(item.dados,c4),
        c5: medSemana(item.dados,c5)
      });
    }
  });

  var semanaIdx = 0;
  var linhas = linhasFinais.map(function(item) {
    if (item.tipo === 'dia') {
      var r = item.r;
      return '<tr>' +
        '<td>' + (r['Data']||'') + '</td><td>' + (r['Dia da Semana']||'') + '</td>' +
        '<td><span class="badge ' + (r['Tipo']==='Real'?'badge-real':'badge-proj') + '">' + r['Tipo'] + '</span></td>' +
        '<td>' + fmt(r[c1],2) + '</td><td class="center">' + fmtVar(r[vc1]) + '</td>' +
        '<td>' + fmt(r[c2],2) + '</td><td class="center">' + fmtVar(r[vc2]) + '</td>' +
        '<td>' + fmt(r[c3],4) + '</td><td class="center">' + fmtVar(r[vc3]) + '</td>' +
        '<td>' + fmt(r[c4],2) + '</td><td class="center">' + fmtVar(r[vc4]) + '</td>' +
        '<td>' + fmt(r[c5],2) + '</td><td class="center">' + fmtVar(r[vc5]) + '</td>' +
        '</tr>';
    } else {
      var ms = mediasSemanas[semanaIdx];
      var mp = semanaIdx > 0 ? mediasSemanas[semanaIdx - 1] : null;
      semanaIdx++;
      return '<tr class="semana-row"><td colspan="3">Media semana</td>' +
        '<td>' + fmt(ms.c1,2) + '</td><td class="center">' + fmtVar(varSem(ms.c1, mp ? mp.c1 : null)) + '</td>' +
        '<td>' + fmt(ms.c2,2) + '</td><td class="center">' + fmtVar(varSem(ms.c2, mp ? mp.c2 : null)) + '</td>' +
        '<td>' + fmt(ms.c3,4) + '</td><td class="center">' + fmtVar(varSem(ms.c3, mp ? mp.c3 : null)) + '</td>' +
        '<td>' + fmt(ms.c4,2) + '</td><td class="center">' + fmtVar(varSem(ms.c4, mp ? mp.c4 : null)) + '</td>' +
        '<td>' + fmt(ms.c5,2) + '</td><td class="center">' + fmtVar(varSem(ms.c5, mp ? mp.c5 : null)) + '</td></tr>';
    }
  }).join('');

  var mR_c=calcMedia(dados,c1,'Real'), mP_c=calcMedia(dados,c1,null);
  var mR_a=calcMedia(dados,c2,'Real'), mP_a=calcMedia(dados,c2,null);
  var mR_d=calcMedia(dados,c3,'Real'), mP_d=calcMedia(dados,c3,null);
  var mR_ck=calcMedia(dados,c4,'Real'), mP_ck=calcMedia(dados,c4,null);
  var mR_ak=calcMedia(dados,c5,'Real'), mP_ak=calcMedia(dados,c5,null);

  // Busca media do mes anterior no historico
  var mesAtual = document.getElementById('month-select').value;
  var idxMesAtual = dadosHistorico.findIndex(function(r) { return (r['Mês'] || r['Mes']) === mesAtual; });
  // Mes anterior = indice anterior, mas excluindo o mes atual (que pode estar no historico)
  var histAnt = null;
  if (idxMesAtual > 0) {
    histAnt = dadosHistorico[idxMesAtual - 1];
  } else if (idxMesAtual === -1 && dadosHistorico.length > 0) {
    // Mes atual nao esta no historico ainda, pega o ultimo
    histAnt = dadosHistorico[dadosHistorico.length - 1];
  }

  function vMes(atual, histAnterior, campo) {
    if (!histAnterior) return null;
    var a = typeof atual === 'number' ? atual : toNum(atual);
    var b = toNum(histAnterior[campo]);
    if (a === null || b === null || b === 0) return null;
    return (a - b) / b;
  }

  function vProj(proj, real) {
    if (proj === null || real === null || real === 0) return null;
    return (proj - real) / real;
  }

  function tdVar(v) {
    return '<td class="center">' + fmtVar(v) + '</td>';
  }

  document.getElementById('table-container').innerHTML =
    '<table><thead><tr><th>Data</th><th>Dia</th><th>Tipo</th>' +
    '<th>Cobre US$/t</th><th class="center">Var%</th><th>Aluminio US$/t</th><th class="center">Var%</th>' +
    '<th>Dolar R$/US$</th><th class="center">Var%</th><th>Cobre R$/kg</th><th class="center">Var%</th>' +
    '<th>Aluminio R$/kg</th><th class="center">Var%</th></tr></thead><tbody>' + linhas +
    '<tr class="media-row media-real-row"><td colspan="3">Media Real</td>' +
    '<td>' + fmt(mR_c,2) + '</td>' + tdVar(vMes(mR_c, histAnt, 'Cobre (US$/t)')) +
    '<td>' + fmt(mR_a,2) + '</td>' + tdVar(vMes(mR_a, histAnt, 'Alumínio (US$/t)')) +
    '<td>' + fmt(mR_d,4) + '</td>' + tdVar(vMes(mR_d, histAnt, 'Dólar')) +
    '<td>' + fmt(mR_ck,2) + '</td>' + tdVar(vMes(mR_ck, histAnt, 'Cobre (R$/kg)')) +
    '<td>' + fmt(mR_ak,2) + '</td>' + tdVar(vMes(mR_ak, histAnt, 'Alumínio (R$/kg)')) + '</tr>' +
    '<tr class="media-row media-proj-row"><td colspan="3">Media Projetada</td>' +
    '<td>' + fmt(mP_c,2) + '</td>' + tdVar(vProj(mP_c, mR_c)) +
    '<td>' + fmt(mP_a,2) + '</td>' + tdVar(vProj(mP_a, mR_a)) +
    '<td>' + fmt(mP_d,4) + '</td>' + tdVar(vProj(mP_d, mR_d)) +
    '<td>' + fmt(mP_ck,2) + '</td>' + tdVar(vProj(mP_ck, mR_ck)) +
    '<td>' + fmt(mP_ak,2) + '</td>' + tdVar(vProj(mP_ak, mR_ak)) + '</tr>' +
    '</tbody></table>';
  document.getElementById('total-dias').textContent = reais.length + ' dias reais - ' + (dados.length - reais.length) + ' projetados';
}

function carregarHistorico() {
  fetch(URL_HIST)
    .then(function(resp) { return resp.text(); })
    .then(function(text) {
      var match = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/);
      var json = JSON.parse(match[1]);
      var rows = json.table.rows;
      var cols = json.table.cols.map(function(c) { return c.label; });
      dadosHistorico = rows.map(function(row) {
        var obj = {};
        cols.forEach(function(col, i) { obj[col] = row.c[i] ? row.c[i].v : null; });
        return obj;
      }).filter(function(r) { return r['M\u00eas'] || r['Mes']; });
      popularFiltroHistorico();
      // Refaz a tabela do mes atual agora que o historico esta disponivel
      filtrarMes();
    })
    .catch(function(e) {
      document.getElementById('hist-tabela').innerHTML = '<div class="state">Erro ao carregar historico.</div>';
    });
}

function popularFiltroHistorico() {
  var anos = new Set();
  dadosHistorico.forEach(function(r) {
    var m = r['M\u00eas'] || r['Mes'] || '';
    var p = m.split('/');
    if (p.length === 2) anos.add(p[1]);
  });
  var anosArr = Array.from(anos).sort();
  var todos = ['Total'].concat(anosArr);
  var btns = todos.map(function(f) {
    return '<button class="hist-btn" data-filtro="' + f + '">' + f + '</button>';
  }).join('');
  document.getElementById('hist-filtro').innerHTML = btns;
  document.querySelectorAll('.hist-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.hist-btn').forEach(function(b) { b.classList.remove('active'); });
      this.classList.add('active');
      renderHistorico(this.getAttribute('data-filtro'));
    });
  });
  document.querySelector('.hist-btn').classList.add('active');
  renderHistorico('Total');
}

function renderHistorico(filtro) {
  var dados = dadosHistorico.filter(function(r) {
    if (filtro === 'Total') return true;
    var m = r['M\u00eas'] || r['Mes'] || '';
    return m.indexOf(filtro) !== -1;
  });
  renderChartHistorico(dados);
  renderTabelaHistorico(dados);
}

function renderChartHistorico(dados) {
  var labels = dados.map(function(r) { return r['M\u00eas'] || r['Mes'] || ''; });
  var cobre = dados.map(function(r) { return toNum(r['Cobre (US$/t)']); });
  var al = dados.map(function(r) { return toNum(r['Alum\u00ednio (US$/t)']); });
  var dol = dados.map(function(r) { return toNum(r['D\u00f3lar']); });
  if (chartHistObj) chartHistObj.destroy();
  var ctx = document.getElementById('chart-hist').getContext('2d');
  chartHistObj = new Chart(ctx, {
    type: 'line',
    data: { labels: labels, datasets: [
      { label: 'Cobre', data: cobre, borderColor: '#c45e1a', borderWidth: 2, pointRadius: 2, tension: 0.3, yAxisID: 'y' },
      { label: 'Aluminio', data: al, borderColor: '#2b6cb0', borderWidth: 2, pointRadius: 2, tension: 0.3, yAxisID: 'y' },
      { label: 'Dolar', data: dol, borderColor: '#1a7a42', borderWidth: 2, pointRadius: 2, tension: 0.3, yAxisID: 'y2' }
    ]},
    options: { responsive: true, interaction: { mode: 'index', intersect: false },
      plugins: { legend: { display: false }, tooltip: { backgroundColor: '#fff', borderColor: '#e2e4ea', borderWidth: 1, titleColor: '#1a1d2e', bodyColor: '#6b7280', padding: 10 } },
      scales: {
        x: { grid: { color: '#e2e4ea' }, ticks: { color: '#6b7280', font: { size: 10 }, maxRotation: 45 } },
        y: { position: 'left', grid: { color: '#e2e4ea' }, ticks: { color: '#6b7280', font: { size: 11 } }, title: { display: true, text: 'US$/t', color: '#6b7280', font: { size: 11 } } },
        y2: { position: 'right', grid: { drawOnChartArea: false }, ticks: { color: '#1a7a42', font: { size: 11 } }, title: { display: true, text: 'R$/US$', color: '#1a7a42', font: { size: 11 } } }
      }
    }
  });
}

function renderTabelaHistorico(dados) {
  var c1='Cobre (US$/t)', c2='Alum\u00ednio (US$/t)', c3='D\u00f3lar', c4='Cobre (R$/kg)', c5='Alum\u00ednio (R$/kg)';
  var vc1='Var. Cobre', vc2='Var. Alum\u00ednio', vc3='Var. D\u00f3lar', vc4='Var. Cobre/kg', vc5='Var. Alum\u00ednio/kg';
  var linhas = dados.map(function(r) {
    var mes = r['M\u00eas'] || r['Mes'] || '';
    return '<tr>' +
      '<td style="font-family:Inter,sans-serif;">' + mes + '</td>' +
      '<td>' + fmt(r[c3],4) + '</td><td class="center">' + fmtVar(r[vc3]) + '</td>' +
      '<td>' + fmt(r[c1],2) + '</td><td class="center">' + fmtVar(r[vc1]) + '</td>' +
      '<td>' + fmt(r[c2],2) + '</td><td class="center">' + fmtVar(r[vc2]) + '</td>' +
      '<td>' + fmt(r[c4],2) + '</td><td class="center">' + fmtVar(r[vc4]) + '</td>' +
      '<td>' + fmt(r[c5],2) + '</td><td class="center">' + fmtVar(r[vc5]) + '</td>' +
      '</tr>';
  }).join('');
  document.getElementById('hist-tabela').innerHTML =
    '<table><thead><tr><th>Mes</th>' +
    '<th>Dolar R$/US$</th><th class="center">Var%</th>' +
    '<th>Cobre US$/t</th><th class="center">Var%</th>' +
    '<th>Aluminio US$/t</th><th class="center">Var%</th>' +
    '<th>Cobre R$/kg</th><th class="center">Var%</th>' +
    '<th>Aluminio R$/kg</th><th class="center">Var%</th>' +
    '</tr></thead><tbody>' + linhas + '</tbody></table>';
}

carregarDados();
carregarHistorico();
carregarMesAnterior();
</script>
